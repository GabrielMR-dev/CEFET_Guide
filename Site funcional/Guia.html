<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="principal.css">
    <link rel="stylesheet" href="Guia.css">
    <title>Guia do Calouro - CEFET Guide</title>
</head>
<body>

<nav class="menu-fixo">
    <div class="menu-logo"><a href="principal.html">CEFET Guide</a></div>
</nav>

<main class="container">
    <div class="Inicio-Guia">
        <h1>Guia do Calouro</h1>
        <p>Folheie as páginas do guia disponibilizado pelo Própio CEFET no primeiro dia de aula do Ensino Técnico.</p>
    </div>

    <div class="navegacao-direta">
        <label for="inputPagina">Ir para a página: </label>
        <input type="number" id="inputPagina" min="1" max="36" placeholder="Ex: 15">
        <button onclick="irParaPaginaDigitada()">Ir</button>
    </div>

    <div class="livro-container">
        
        <button class="seta-nav esquerda" id="btnVoltar" onclick="mudarPar(-1)">&#10094;</button>

        <div class="livro-visor" id="livroVisor">
            </div>

        <button class="seta-nav direita" id="btnAvancar" onclick="mudarPar(1)">&#10095;</button>
    </div>

    <div class="progresso-container">
        <div class="barra-progresso">
            <div class="progresso-atual" id="barraProgresso"></div>
        </div>
        <div class="indicador-paginas" id="indicador">Páginas 1-2 de 36</div>
    </div>
</main>

<script>
    // 1. Configuração do total de páginas
    const totalPaginas = 36;
    let parAtual = 0; // Controla o par visível (0 significa páginas 1 e 2, 1 significa 3 e 4, etc.)

    // 2. Criação da lista com o caminho das 36 imagens automaticamente
    // Assume que as tuas imagens se chamam Pagina1.jpg, Pagina2.jpg... até Pagina36.jpg dentro da pasta Imagens
    const imagens = [];
    for (let i = 1; i <= totalPaginas; i++) {
        imagens.push(`Imagens-Guia/Pagina${i}.jpeg`);
    }

    const visor = document.getElementById('livroVisor');
    const indicador = document.getElementById('indicador');
    const barraProgresso = document.getElementById('barraProgresso');

    // 3. Função para renderizar o par de páginas atual na tela
    function renderizarPaginas() {
        visor.innerHTML = ''; // Limpa o visor

        // Descobre o índice da página esquerda e direita
        const indexEsquerda = parAtual * 2;
        const indexDireita = indexEsquerda + 1;

        // Cria a estrutura do par
        const divPar = document.createElement('div');
        divPar.className = 'par-paginas ativo';

        // Cria a imagem da esquerda
        const imgEsq = document.createElement('img');
        imgEsq.src = imagens[indexEsquerda];
        imgEsq.alt = `Página ${indexEsquerda + 1}`;
        imgEsq.className = 'pagina-livro';
        divPar.appendChild(imgEsq);

        // Cria a imagem da direita (se ela existir, útil caso o total fosse ímpar)
        if (indexDireita < totalPaginas) {
            const imgDir = document.createElement('img');
            imgDir.src = imagens[indexDireita];
            imgDir.alt = `Página ${indexDireita + 1}`;
            imgDir.className = 'pagina-livro';
            divPar.appendChild(imgDir);
        }

        visor.appendChild(divPar);

        // Atualiza os textos e a barra de progresso
        indicador.innerText = `Páginas ${indexEsquerda + 1}-${indexDireita + 1} de ${totalPaginas}`;
        
        // Calcula a percentagem da barra de progresso
        const percentagem = ((indexDireita + 1) / totalPaginas) * 100;
        barraProgresso.style.width = `${percentagem}%`;

        // Desativa as setas se chegar nos limites
        document.getElementById('btnVoltar').disabled = (parAtual === 0);
        document.getElementById('btnAvancar').disabled = (indexDireita >= totalPaginas - 1);
    }

    // 4. Função para avançar ou voltar pelos botões de seta
    function mudarPar(direcao) {
        parAtual += direcao;
        renderizarPaginas();
    }

    // 5. Função para o utilizador saltar direto para uma página específica
    function irParaPaginaDigitada() {
        const input = document.getElementById('inputPagina');
        const numPagina = parseInt(input.value);

        if (numPagina >= 1 && numPagina <= totalPaginas) {
            // Converte o número da página para o índice do par correto
            parAtual = Math.floor((numPagina - 1) / 2);
            renderizarPaginas();
            input.value = ''; // Limpa o campo
        } else {
            alert(`Por favor, digite uma página válida entre 1 e ${totalPaginas}.`);
        }
    }

    // Inicializa o livro na primeira página ao carregar o site
    renderizarPaginas();
</script>

</body>
</html>
